<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রজেক্টস | Fx Alamin Design</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 40px;
        }
        .logo { font-size: 2.8rem; font-weight: bold; }
        h1 { text-align: center; margin: 30px 0 50px; font-size: 3rem; }
        
        .gallery {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .design-card {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
        }
        .design-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .design-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .info {
            padding: 20px;
        }
        .info h3 { margin-bottom: 10px; }
        .date { font-size: 0.9rem; opacity: 0.8; margin-top: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Fx Alamin Design</div>
    </header>

    <h1>আমার ডিজাইন প্রজেক্টস</h1>
    
    <div class="gallery">
        
        <div class="design-card">
            <img src="design1.jpg" alt="ফলের উৎসব 2026">
            <div class="info">
                <h3>ফলের উৎসব 2026</h3>
                <p>ফেস্টিভাল পোস্টার ডিজাইন</p>
                <div class="date">১৩ জুন, ২০২৬</div>
            </div>
        </div>

        <div class="design-card">
            <img src="design2.jpg" alt="ফ্রি ক্যাম্পেইন">
            <div class="info">
                <h3>ফ্রি ক্যাম্পেইন ব্যানার</h3>
                <p>ডিজিটাল ব্যানার ডিজাইন</p>
                <div class="date">১২ জুন, ২০২৬</div>
            </div>
        </div>

    </div>

    <p style="text-align:center; margin-top: 60px;">
        <a href="index.html" style="color:#ffd700; font-size:1.3rem;">← হোমে ফিরে যাও</a>
    </p>
</body>
</html>
