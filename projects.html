<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রজেক্টস | My Design Works</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.15);
            padding: 1rem 0;
            text-align: center;
            margin-bottom: 50px;
            border-radius: 15px;
        }
        .logo { font-size: 2.5rem; font-weight: bold; }
        h1 { text-align: center; margin-bottom: 60px; font-size: 3.2rem; }
        
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .design-card {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .design-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .design-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .info {
            padding: 20px;
        }
        .info h3 {
            margin-bottom: 8px;
            font-size: 1.4rem;
        }
        .info p {
            opacity: 0.9;
            font-size: 1rem;
            line-height: 1.5;
        }
        .date {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">My Design Works</div>
    </header>

    <h1>আমার ডিজাইন প্রজেক্টস</h1>
    
    <div class="gallery">
        
        <!-- নতুন ডিজাইন এখানে যোগ করবে (প্রতিদিন) -->
        <div class="design-card">
            <img src="design1.jpg" alt="ডিজাইন ১">
            <div class="info">
                <h3>প্রজেক্ট নাম ১</h3>
                <p>সংক্ষিপ্ত বর্ণনা। কোন টুল দিয়ে বানিয়েছি, ক্লায়েন্ট ইত্যাদি।</p>
                <div class="date">১৩ জুন, ২০২৬</div>
            </div>
        </div>

        <!-- আরেকটা উদাহরণ -->
        <div class="design-card">
            <img src="design2.jpg" alt="ডিজাইন ২">
            <div class="info">
                <h3>প্রজেক্ট নাম ২</h3>
                <p>এখানে তোমার দ্বিতীয় ডিজাইনের বর্ণনা লিখবে।</p>
                <div class="date">১২ জুন, ২০২৬</div>
            </div>
        </div>

    </div>

    <p style="text-align:center; margin-top: 60px;">
        <a href="index.html" style="color:#ffd700; font-size: 1.3rem;">← হোমে ফিরে যাও</a>
    </p>
</body>
</html>
