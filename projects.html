<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Fx Alamin Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #fff;
            line-height: 1.6;
        }
        header {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: #a78bfa;
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            margin-left: 40px;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #c4b5fd; }

        h1 {
            text-align: center;
            font-size: 3.8rem;
            margin: 80px 0 60px;
            font-family: 'Playfair Display', serif;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
        }

        .design-card {
            background: #1a1a2e;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .design-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 25px 50px rgba(167, 139, 250, 0.2);
        }
        .design-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: 0.6s;
        }
        .design-card:hover img {
            transform: scale(1.08);
        }
        .info {
            padding: 28px;
        }
        .info h3 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #e0e0ff;
        }
        .info p {
            color: #b0b0cc;
            margin-bottom: 15px;
        }
        .date {
            font-size: 0.95rem;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Fx Alamin</div>
            <div class="nav-links">
                <a href="index.html">হোম</a>
                <a href="about.html">আমার সম্পর্কে</a>
                <a href="projects.html">প্রজেক্টস</a>
            </div>
        </nav>
    </header>

    <h1>Selected Works</h1>
    
    <div class="gallery">
        <!-- এখানে তোমার ডিজাইন যোগ করবে -->
        <div class="design-card">
            <img src="design1.jpg" alt="প্রজেক্ট ১">
            <div class="info">
                <h3>ফলের উৎসব ২০২৬</h3>
                <p>ফেস্টিভাল পোস্টার ও ব্র্যান্ডিং</p>
                <div class="date">জুন ২০২৬ • Poster Design</div>
            </div>
        </div>

        <div class="design-card">
            <img src="design2.jpg" alt="প্রজেক্ট ২">
            <div class="info">
                <h3>ফ্রি ক্যাম্পেইন</h3>
                <p>সোশ্যাল মিডিয়া ব্যানার সিরিজ</p>
                <div class="date">জুন ২০২৬ • Campaign</div>
            </div>
        </div>

        <!-- নতুন ডিজাইন যোগ করার জন্য এই ব্লক কপি করে ব্যবহার করো -->
        <!-- <div class="design-card">
            <img src="তোমার-ছবি.jpg" alt="প্রজেক্ট নাম">
            <div class="info">
                <h3>প্রজেক্টের নাম</h3>
                <p>সংক্ষিপ্ত বর্ণনা</p>
                <div class="date">তারিখ • ক্যাটাগরি</div>
            </div>
        </div> -->

    </div>
</body>
</html>
