<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Fx Alamin Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #1a1a2e;
            transition: all 0.4s;
        }
        body.dark {
            background: #0f0f1a;
            color: #fff;
        }

        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1.2rem 0;
            border-bottom: 1px solid #eee;
        }
        body.dark header { background: rgba(15,15,26,0.95); border-bottom: 1px solid #333; }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: #6d28d9;
        }
        body.dark .logo { color: #c4b5fd; }

        .filters {
            max-width: 1400px;
            margin: 50px auto 30px;
            padding: 0 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .filter-btn {
            padding: 10px 24px;
            border: 2px solid #6d28d9;
            background: transparent;
            color: #6d28d9;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        body.dark .filter-btn { color: #c4b5fd; border-color: #c4b5fd; }
        .filter-btn.active, .filter-btn:hover {
            background: #6d28d9;
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 3.6rem;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
        }

        .design-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
            opacity: 0;
            animation: fadeInUp 0.8s forwards;
        }
        body.dark .design-card { background: #1a1a2e; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        .design-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 25px 50px rgba(109, 40, 217, 0.25);
        }
        .design-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: 0.6s;
        }
        .design-card:hover img {
            transform: scale(1.08);
        }
        .info {
            padding: 28px;
        }
        .info h3 { font-size: 1.55rem; margin-bottom: 10px; }
        .info p { color: #555; margin-bottom: 12px; }
        body.dark .info p { color: #bbb; }
        .date { font-size: 0.95rem; color: #888; }
        body.dark .date { color: #999; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Fx Alamin</div>
            <div>
                <button onclick="toggleTheme()" style="padding:10px 16px; border:none; background:#6d28d9; color:white; border-radius:50px; cursor:pointer;">
                    🌙 / ☀️
                </button>
            </div>
        </nav>
    </header>

    <h1>My Design Works</h1>

    <div class="filters">
        <button class="filter-btn active" onclick="filterCategory('all')">All</button>
        <button class="filter-btn" onclick="filterCategory('poster')">Poster</button>
        <button class="filter-btn" onclick="filterCategory('banner')">Banner</button>
        <button class="filter-btn" onclick="filterCategory('social')">Social Media</button>
        <button class="filter-btn" onclick="filterCategory('branding')">Branding</button>
    </div>
    
    <div class="gallery" id="gallery">
        <!-- তোমার সব ডিজাইন এখানে যোগ করো -->
        <div class="design-card" data-category="poster">
            <img src="design1.jpg" alt="ফলের উৎসব">
            <div class="info">
                <h3>ফলের উৎসব ২০২৬</h3>
                <p>ফেস্টিভাল পোস্টার ডিজাইন</p>
                <div class="date">জুন ২০২৬ • Poster</div>
            </div>
        </div>

        <!-- আরও কার্ড যোগ করতে নিচের ব্লক কপি করে ব্যবহার করো -->
        <!-- 
        <div class="design-card" data-category="banner">
            <img src="design2.jpg" alt="ব্যানার">
            <div class="info">
                <h3>প্রজেক্ট নাম</h3>
                <p>বর্ণনা</p>
                <div class="date">তারিখ • Category</div>
            </div>
        </div>
        -->
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        function filterCategory(category) {
            const cards = document.querySelectorAll('.design-card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(card => {
                if (category === 'all') {
                    card.style.display = 'block';
                } else {
                    card.style.display = card.getAttribute('data-category') === category ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
